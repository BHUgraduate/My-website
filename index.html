<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>मेरी पहली लाइव वेबसाइट</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .card {
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 { color: #2ecc71; }
        p { color: #34495e; }
    </style>
</head>
<body>
    <div class="card">
        <h1>नमस्ते दुनिया!</h1>
        <p>यह वेबसाइट GitHub Pages की मदद से लाइव है।</p>
    </div>
</body>
</html>
